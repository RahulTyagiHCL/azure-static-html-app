<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Static Web App</title>

    <!-- ✅ Bootstrap CSS -->

     <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ✅ D3.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>

<!-- Your existing app logic -->


<!-- ✅ D3 chart logic -->
<script src="d3-chart.js"></script>


    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light">

<!-- HEADER -->
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand fw-bold">Azure Static Web App Demo</span>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4">

    <!-- INPUT FORM -->
    <div class="card mb-4">
        <div class="card-header fw-bold">Enter Values</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <input type="text" id="txt1" class="form-control" placeholder="Textbox 1">
                </div>
                <div class="col-md-4">
                    <input type="text" id="txt2" class="form-control" placeholder="Textbox 2">
                </div>
                <div class="col-md-4">
                    <input type="text" id="txt3" class="form-control" placeholder="Textbox 3">
                </div>
            </div>
            <button id="btnAdd" class="btn btn-success mt-3">Add to Grid</button>
        </div>
    </div>

    <!-- GRID -->
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Value 1</th>
                <th>Value 2</th>
                <th>Value 3</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="gridBody"></tbody>
    </table>

    <button id="btnSubmit" class="btn btn-primary">
        Submit & Show JSON
    </button>
</div>
   <hr class="my-5">

    <h4 class="text-primary mb-3">Sample D3.js Visualization (Animated)</h4>

    <div id="chartContainer" class="bg-white border p-3 rounded"></div>

    <button id="btnRedraw" class="btn btn-outline-primary mt-3">
        Re‑Animate Chart
    </button>



<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-4">
    © 2026 Azure Static Web App
</footer>
<script src="asset/js/app.js"></script>

</body>
</html>
